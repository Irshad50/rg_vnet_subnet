trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.12.2'

- task: AzureCLI@2
  inputs:
    azureSubscription: 'azure-sp-conn'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      terraform init -reconfigure
      terraform validate
      terraform plan
      terraform apply -auto-approve
